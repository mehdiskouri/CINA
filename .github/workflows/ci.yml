name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  checks:
    name: Lint, Typecheck, Test
    runs-on: ubuntu-latest

    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_DB: cina
          POSTGRES_USER: cina
          POSTGRES_PASSWORD: cina_dev
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U cina -d cina"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://cina:cina_dev@localhost:5432/cina
      REDIS_URL: redis://localhost:6379/0
      CINA_CONFIG_PATH: cina.yaml

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: "pip"

      - name: Install dependencies
        run: python -m pip install --upgrade pip && pip install -e ".[dev]"

      - name: Ruff lint
        run: make lint

      - name: Mypy typecheck
        run: make typecheck

      - name: Apply migrations
        run: make migrate

      - name: Unit tests
        run: make test
